name: Release

concurrency:
    group: ${{ github.workflow }}

on:
    push:
        branches:
            - main

permissions:
    contents: write
    pull-requests: write
    issues: write

jobs:
    release-please:
        name: Release Please
        runs-on: ubuntu-latest
        steps:
            - name: Create Release
              uses: google-github-actions/release-please-action@v4